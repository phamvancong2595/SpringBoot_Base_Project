services:
  mysql:
    image: mysql:8.0
    container_name: mysql_jira
    restart: always
    environment:
      MYSQL_DATABASE: springboot_base_db
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - jira-network
  redis_jira:
    image: redis:7.2-alpine
    container_name: redis_jira
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./redis_data:/data
    restart: always
volumes:
  mysql_data:

networks:
  jira-network:
    driver: bridge