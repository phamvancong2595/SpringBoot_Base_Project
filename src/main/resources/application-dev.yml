spring:
  datasource:
    url: jdbc:mysql://localhost:3307/springboot_base_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: root
    password: ${DB_PASSWORD}
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  jpa:
    hibernate:
      ddl-auto: none
      default_batch_fetch_size: ${DEFAULT_BATCH_FETCH_SIZE:50}
    show-sql: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.flywaydb.core: INFO
    com.zaxxer.hikari: INFO
    org.springframework.security: DEBUG